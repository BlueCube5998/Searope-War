<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Searope War - Loading</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; text-align: center; }
        p { color: #555; }
        .version { font-size: 0.8rem; color: #999; margin-top: 10px; }
    </style>
</head>
<body>
    <p>Launching <strong>Searope War</strong>...</p>
    <p class="version">Version 0.3.0</p>

    <script>
        // 1. Register the Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Failed', err));
        }

        // 2. Optimized Redirect Logic
        // We use a slight delay to ensure the SW registration starts, 
        // then we redirect to the local file path so it works offline.
        setTimeout(function() {
            window.location.href = "./searope war.html";
        }, 800);
    </script>
</body>
</html>
