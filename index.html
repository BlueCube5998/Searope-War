<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Searope War</title>
    <style>
        /* 1. Black background to blend with phone bezels */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 2. This container stretches to the display size but keeps the 16:9 ratio */
        .game-container {
            width: 100vw;
            height: 56.25vw; /* Maintain 640x360 proportion */
            max-height: 100vh;
            max-width: 177.78vh; /* Prevent stretching wider than 16:9 */
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Adds a slight depth */
        }

        /* 3. The iframe fills the container perfectly */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <iframe 
            src="https://bluecube5998.github.io/searope-war/searope%20war.html" 
            allowfullscreen
            allow="autoplay; fullscreen; keyboard-focus">
        </iframe>
    </div>

</body>
</html>
