<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Redirecting...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        p { color: #555; }
    </style>
</head>
<body>
    <p>Redirecting to <strong>Searope War</strong>...</p>

    <script>
        // 1. Register the Service Worker (The "Offline Engine")
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Offline mode active"))
                .catch(err => console.log("Offline mode failed", err));
        }

        // 2. Redirect using a RELATIVE path for offline support
        setTimeout(function() {
            window.location.href = "./searope war.html"; 
        }, 1000);
    </script>
</body>
</html>
