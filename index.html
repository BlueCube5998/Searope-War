<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Searope War</title>
    <style>
        /* Centers the game on the phone screen and adds a black background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The 16:9 (640x360) Responsive Container */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Math: (360 / 640) * 100 */
            max-height: 100vh;
            max-width: 177.78vh; /* Math: (640 / 360) * 100 */
        }

        /* Makes the game fill the wrapper exactly */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <iframe 
            src="https://bluecube5998.github.io/searope-war/searope%20war.html" 
            allowfullscreen
            allow="autoplay; fullscreen; keyboard-focus">
        </iframe>
    </div>

</body>
</html>
