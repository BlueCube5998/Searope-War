<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Searope War</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000; /* Black background like a real console */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100vw;
            /* This formula maintains the 16:9 (640x360) ratio */
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh; /* Prevents it from getting too wide on tablets */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <iframe 
            src="https://bluecube5998.github.io/Searope-War/searope%20war.html" 
            allowfullscreen
            allow="autoplay; fullscreen; keyboard-focus">
        </iframe>
    </div>

</body>
</html>
